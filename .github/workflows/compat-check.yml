name: Wire contract compatibility

# Backward-compatibility gate for the control-plane<->agent JSON wire contract.
# Runs this module's tests — including the golden round-trip check that fails
# on a breaking (non-additive) wire change. The wire is hand-written JSON (no
# protobuf/buf), so this golden gate stands in for `buf breaking`. Policy:
# docs/version-compatibility.md.
#
# Reusable workflow: the PR trigger lives one level up in pr.yml, which calls
# this via `uses: ./.github/workflows/compat-check.yml`.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Wire contract tests + backward-compat gate
        run: go test ./... -count=1 -timeout 120s
