version: "2"

linters:
  default: standard
  enable:
    - unparam
    - gosec
    - bodyclose
    - noctx
    - revive
    - gocritic
  settings:
    revive:
      rules:
        - name: unused-parameter
    gocritic:
      disabled-checks:
        - ifElseChain
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports
